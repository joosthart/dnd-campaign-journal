<nav>
  <a href="{{ site.baseurl }}/" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
  {% if page.campaign %}
    {% for campaign in site.data.campaigns %}
      {% if campaign.slug == page.campaign %}
        {% for item in campaign.nav %}
          <a href="{{ site.baseurl }}{{ item.url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.label }}</a>
        {% endfor %}
      {% endif %}
    {% endfor %}
  {% else %}
    {% for campaign in site.data.campaigns %}
      <a href="{{ site.baseurl }}/{{ campaign.slug }}/" {% if page.url contains campaign.slug %}class="active"{% endif %}>{{ campaign.name }}</a>
    {% endfor %}
  {% endif %}
</nav>
